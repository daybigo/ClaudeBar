name: release

# Construye los instaladores y publica una release al empujar un tag vX.Y.Z.
# Windows -> NSIS (.exe) con toolchain MSVC; Linux -> .deb y .AppImage.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: ""
          - os: ubuntu-latest
            args: "--bundles deb,appimage"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Dependencias del sistema (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev

      - name: Instalar dependencias del frontend
        run: npm install

      - name: Construir y publicar la release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Claude Bar ${{ github.ref_name }}"
          releaseBody: "Windows: `irm https://raw.githubusercontent.com/daybigo/ClaudeBar/main/install.ps1 | iex`. Linux: descarga el .deb o .AppImage abajo."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
